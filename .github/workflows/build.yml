name: Build CHIM Installer

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Verify patches exist
        run: |
          ls -la patches/
          du -sh patches/
          ls patches/paks/*.pak | wc -l

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          sudo apt-get install -y python3-tk

      - name: Download static 7z binary
        run: |
          curl -L "https://www.7-zip.org/a/7z2409-linux-x64.tar.xz" -o 7z.tar.xz
          tar xf 7z.tar.xz 7zzs
          chmod +x 7zzs

      - name: Build Linux executable (onedir)
        run: |
          pyinstaller \
            --noconfirm \
            --onedir \
            --name CHIM_Installer \
            --add-data "patches:patches" \
            --add-data "7zzs:." \
            --windowed \
            chim_installer.py

      - name: Create Linux tarball
        run: |
          cd dist
          tar czf CHIM_Installer_Linux.tar.gz CHIM_Installer/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: CHIM_Installer_Linux
          path: dist/CHIM_Installer_Linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull LFS files
        run: git lfs pull

      - name: Verify patches exist
        shell: powershell
        run: |
          Get-ChildItem patches/ | Format-Table Name
          (Get-ChildItem patches/paks/*.pak).Count

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Download 7z for Windows
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://www.7-zip.org/a/7z2409-extra.7z" -OutFile "7z-extra.7z"
          & "C:\Program Files\7-Zip\7z.exe" x 7z-extra.7z 7za.exe "-o."

      - name: Build Windows executable (onedir)
        run: |
          pyinstaller --noconfirm --onedir --name CHIM_Installer --add-data "patches;patches" --add-data "7za.exe;." --windowed --icon=NONE chim_installer.py

      - name: Create Windows zip
        shell: powershell
        run: |
          Compress-Archive -Path "dist\CHIM_Installer" -DestinationPath "dist\CHIM_Installer_Windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CHIM_Installer_Windows
          path: dist/CHIM_Installer_Windows.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CHIM_Installer_Linux/CHIM_Installer_Linux.tar.gz
            CHIM_Installer_Windows/CHIM_Installer_Windows.zip

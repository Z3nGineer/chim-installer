[SystemSettings]
r.TextureStreaming=1
r.Streaming.PoolSize=3072
r.Streaming.LimitPoolSizeToVRAM=1
r.Streaming.DefragDynamicBounds=1
r.Streaming.MipBias=0.5
r.Streaming.MaxTempMemoryAllowed=256
r.ShaderPipelineCache.Enabled=1
r.ShaderPipelineCache.BatchTime=2

[/Script/Engine.RendererSettings]
r.RayTracing=False
r.Lumen.DiffuseIndirect.Allow=0
r.Lumen.Reflections.Allow=0
r.Lumen.HardwareRayTracing=0

[ConsoleVariables]
; === CHIM Deck — Custom Engine.ini for Steam Deck ===
; Lumen / Ray Tracing — fully disabled
r.Lumen.DiffuseIndirect.Allow=0
r.Lumen.Reflections.Allow=0
r.Lumen.HardwareRayTracing=0

; Shadows — cascades 10→2, resolution 8192→1024
r.Shadow.Virtual.Enable=0
r.Shadow.CSM.MaxCascades=2
r.Shadow.MaxResolution=1024
r.Shadow.DistanceScale=0.6
r.Shadow.RadiusThreshold=0.06
r.ContactShadows=0

; Fog — disabled
r.VolumetricFog=0
r.Fog=0

; Nanite — reduced polygon density
r.Nanite.MaxPixelsPerEdge=2.0
r.Nanite.MaxNodes=524288
r.Nanite.MaxVisibleClusters=524288

; Foliage / Grass — 40% density
foliage.DensityScale=0.4
grass.DensityScale=0.4
foliage.DiscardDataOnLoad=1
grass.DiscardDataOnLoad=1

; Screen Space Reflections — disabled
r.SSR.Quality=0
r.SSR.HalfResSceneColor=1

; Cloth physics — disabled
p.ClothPhysics=0

; Draw distance — reduced
r.ViewDistanceScale=0.6
r.SkeletalMeshLODBias=2
r.StaticMeshLODBias=2

; Occlusion culling — enabled
r.InstanceCulling.OcclusionCull=1
r.HZBOcclusion=1

; Sharpening
r.Tonemapper.Sharpen=0.3
r.TemporalAA.HistoryScreenPercentage=100
r.TSR.History.ScreenPercentage=100

; Shader caching — reduces traversal stutter
r.ShaderPipelineCache.Enabled=1
r.ShaderPipelineCache.BatchTime=2
r.CreateShadersOnLoad=1
D3D12.PSO.DiskCache=1
D3D12.PSO.DriverOptimizedDiskCache=1

; Loading screen crash fix — cap FPS
t.MaxFPS=30

; Misc performance
r.GPUCrashDebugging=0
r.DepthOfField.MaxSize=0
r.BloomQuality=0
r.MotionBlurQuality=0
r.AmbientOcclusionLevels=1
r.LightShaftQuality=0
r.RefractionQuality=0
r.TranslucencyLightingVolumeDim=24
r.ParticleLightComplexity=0
r.EarlyZPass=1
r.EarlyZPassOnlyMaterialMasking=1
